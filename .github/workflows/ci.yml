name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: build
        run: |
          mkdir -p bin
          go build -o bin/permafrost  ./cmd/permafrost
          go build -o bin/permafrostd ./cmd/permafrostd

      - name: test
        run: go test ./... -race -count=1
