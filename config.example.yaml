# Permafrost configuration (example).
# Copy to config.yaml and fill in real values. Never commit config.yaml.

env: dev                 # dev | prod (controls log format, defaults)

server:
  bind: 127.0.0.1:8080   # default loopback for v1 (single operator)
  auth_token: ""         # required if bind is non-loopback; bearer token

logging:
  level: info            # debug | info | warn | error
  format: ""             # "" = auto (text in dev, json in prod), or "text" / "json"

database:
  # postgres + timescale; matches deploy/compose/docker-compose.yml
  url: postgres://permafrost:permafrost@localhost:5432/permafrost?sslmode=disable
  max_conns: 16
  min_conns: 2

inference:
  # Single OpenAI-compatible client. Each entry below points at a different
  # base_url so providers can be swapped via config. Add your own here.
  default: openrouter
  providers:
    openai:
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
    openrouter:
      base_url: https://openrouter.ai/api/v1
      api_key_env: OPENROUTER_API_KEY
    groq:
      base_url: https://api.groq.com/openai/v1
      api_key_env: GROQ_API_KEY
    ollama:
      base_url: http://localhost:11434/v1
      api_key_env: ""        # not required for local Ollama

wallet:
  keystore_path: ""                              # default: ~/.permafrost/keystore.json
  passphrase_env: PERMAFROST_KEYSTORE_PASSPHRASE # env var holding the unlock passphrase

solana:
  # Plug in a paid RPC for production (Helius / Triton / Quicknode).
  rpc_url: https://api.mainnet-beta.solana.com
  jupiter_base_url: https://api.jup.ag                # leave empty to use default
  jupiter_api_key: ""                                  # required for higher tiers
  submit_mode: jito                                    # jito | rpc
  jito_bundle_url: https://mainnet.block-engine.jito.wtf/api/v1/bundles
  priority_fee_micro_lamports: 0                       # 0 = no priority fee
  confirmation_timeout_secs: 90

evm:
  # Multi-chain spot legs via 1inch v6. One free API key works across
  # every chain — get one at https://portal.1inch.dev .
  oneinch_api_key_env: ONEINCH_API_KEY    # env var name; takes precedence over oneinch_api_key below
  oneinch_api_key: ""                     # inline (avoid; prefer the env var)
  oneinch_base_url: ""                    # leave empty for the public api.1inch.dev
  default_slippage_bps: 50                # 0.5% — applied when SwapIntent.SlippageBps is unset
  confirmation_timeout_secs: 90
  chains:
    # Omit a chain to disable it. The runtime falls back to paper-spot
    # (records intent, never broadcasts) for any chain not listed here.
    ethereum:
      rpc_url: https://ethereum-rpc.publicnode.com
    base:
      rpc_url: https://mainnet.base.org
    avalanche:
      rpc_url: https://api.avax.network/ext/bc/C/rpc
    bsc:
      rpc_url: https://bsc-rpc.publicnode.com
